<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Latihan Kubus</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body>

<nav class="navbar navbar-dark bg-gradient">
  <div class="container">
    <a href="index.html" class="navbar-brand">⬅ Kembali</a>
  </div>
</nav>

<div class="container mt-4">

<h2 class="text-center">🧠 Latihan Pilihan Ganda</h2>

<h4 class="text-center">Skor: <span id="score">0</span></h4>

<div id="soalContainer"></div>

<!-- NAVIGASI -->
<div class="d-flex justify-content-between mt-5">
  <a href="materi.html" class="btn btn-secondary">⬅️ Kembali Belajar</a>
  <a href="ujian.html" class="btn btn-success">🚀 Lanjut Ujian</a>
</div>

</div>

<script>

// ================= DATA SOAL =================
const soal = [

/// ================= PENGERTIAN =================
{
  tanya:"Kubus memiliki berapa sisi?",
  opsi:["4","6","8","12"],
  benar:"6"
},
{
  tanya:"Jumlah rusuk kubus adalah?",
  opsi:["8","10","12","14"],
  benar:"12"
},
{
  tanya:"Bentuk sisi kubus adalah?",
  opsi:["Segitiga","Persegi","Lingkaran","Trapesium"],
  benar:"Persegi"
},
{
  tanya:"Jumlah titik sudut kubus adalah?",
  opsi:["6","8","10","12"],
  benar:"8"
},

/// ================= JARING =================
{
  tanya:"Jaring kubus terdiri dari?",
  opsi:["4 persegi","5 persegi","6 persegi","7 persegi"],
  benar:"6 persegi"
},
{
  tanya:"Jaring kubus harus?",
  opsi:["Terpisah","Terhubung","Bulat","Segitiga"],
  benar:"Terhubung"
},
{
  tanya:"Jika dilipat jaring yang salah akan?",
  opsi:["Membesar","Menyusut","Bertabrakan","Menghilang"],
  benar:"Bertabrakan"
},
{
  tanya:"Tidak semua jaring bisa menjadi kubus karena?",
  opsi:["Kurang sisi","Tidak bisa dilipat","Berwarna","Terlalu besar"],
  benar:"Tidak bisa dilipat"
},

/// ================= LUAS =================
{
  tanya:"Rumus luas permukaan kubus adalah?",
  opsi:["s³","6s²","s²","12s"],
  benar:"6s²"
},
{
  tanya:"Jika s = 4, luas permukaan?",
  opsi:["64","96","16","24"],
  benar:"96"
},
{
  tanya:"Jumlah sisi kubus adalah?",
  opsi:["4","5","6","7"],
  benar:"6"
},
{
  tanya:"Luas satu sisi kubus adalah?",
  opsi:["s³","s²","2s","6s"],
  benar:"s²"
},

/// ================= VOLUME =================
{
  tanya:"Rumus volume kubus adalah?",
  opsi:["s²","s³","6s²","12s"],
  benar:"s³"
},
{
  tanya:"Jika s = 3, volume kubus?",
  opsi:["9","27","18","36"],
  benar:"27"
},
{
  tanya:"Volume adalah?",
  opsi:["Luas","Isi ruang","Keliling","Tinggi"],
  benar:"Isi ruang"
},
{
  tanya:"Jika s = 5, volume?",
  opsi:["25","125","50","100"],
  benar:"125"
}

];

// ================= GENERATE =================
let container = document.getElementById("soalContainer");
let score = 0;

soal.forEach((s, i) => {

  let opsiHTML = "";

  s.opsi.forEach(o => {
    opsiHTML += `
      <button class="btn btn-outline-primary d-block w-100 mt-2"
        onclick="cek(${i}, '${o}')">${o}</button>
    `;
  });

  container.innerHTML += `
    <div class="card p-4 mt-3">
      <p><b>Soal ${i+1}:</b> ${s.tanya}</p>
      ${opsiHTML}
      <p id="fb${i}" class="mt-2"></p>
    </div>
  `;
});

// ================= CEK =================
function cek(i, pilih) {

  let fb = document.getElementById("fb"+i);

  if (pilih === soal[i].benar) {
    fb.innerHTML = "🎉 Benar!";
    fb.style.color = "green";
    score += 5;
  } else {
    fb.innerHTML = "❌ Salah!";
    fb.style.color = "red";
  }

  document.getElementById("score").innerText = score;
}

</script>

</body>
</html>
